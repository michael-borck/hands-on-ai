    - "API Reference": api-reference.md
    - "Bot Template": bot-template.md
    - "Project Tools": project-tools.md
    - "LLM Guide": llm-guide.md
  - About:
    - "Authors": authors.md
    - "Contributing": contributing.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: google
            show_signature: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.emoji

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/michael-borck/hands-on-ai

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/custom.js

