      - Build Your Own Personality Bot: projects/chat/build-your-own-personality-bot.md
      - Choose Your Own Adventure: projects/chat/choose-your-own-adventure.md
      - Classroom Simulation Bot: projects/chat/classroom-simulation-bot.md
      - Code Explainer Tool: projects/chat/code-explainer-tool.md
      - Creative Writing Partner: projects/chat/creative-writing-partner.md
      - Data Visualization Dashboard: projects/chat/data-visualization-dashboard.md
      - Debate Interview Panel Dialogue Simulator: projects/chat/debate-interview-panel-dialogue-simulator.md
      - Emotional Support Bot: projects/chat/emotional-support-bot.md
      - Historical Figure Chat: projects/chat/historical-figure-chat.md
      - Image Gallery Creator: projects/chat/image-gallery-creator.md
      - Journal or Reflection Bot: projects/chat/journal-or-reflection-bot.md
      - Knowledge Quiz Bot: projects/chat/knowledge-quiz-bot.md
      - Language Translation Helper: projects/chat/language-translation-helper.md
      - Mood Journal Assistant: projects/chat/mood-journal-assistant.md
      - Personality Bot Creator: projects/chat/personality-bot-creator.md
      - Smart To-Do List: projects/chat/smart-to-do-list.md
      - Subject Expert Tutor: projects/chat/subject-expert-tutor.md
      - Text Adventure Game Engine: projects/chat/text-adventure-game-engine.md
      - Trivia or Quiz Bot: projects/chat/trivia-or-quiz-bot.md
      - Weather Dashboard: projects/chat/weather-dashboard.md
      - YouTube to Blog Converter: projects/chat/youtube-to-blog-converter.md
    - RAG Projects:
      - Build Your Own QA CLI: projects/rag/build-your-own-qa-cli.md
