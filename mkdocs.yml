site_name: HandsOnAI Documentation
site_url: https://michael-borck.github.io/hands-on-ai/
repo_url: https://github.com/michael-borck/hands-on-ai
repo_name: michael-borck/hands-on-ai
edit_uri: edit/main/docs/
theme:
  name: material
  favicon: assets/icon-192.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
  palette:
    scheme: default
    primary: indigo
    accent: light blue
nav:
  - Home: index.md
  - "Our Approach": philosophy.md
  - Getting Started:
    - "Install & First Run": installation.md
    - "Choose a Provider": providers.md
    - "Notebooks & Colab": notebooks.md
    - "Ollama Setup": ollama-guide.md
    - "Configuration": configuration.md
  - Learn:
    - Chat:
      - "Understanding Chat & Bots": chat-concepts.md
      - "CLI Guide": chat-guide.md
      - "Personality Gallery": bot-gallery.md
    - RAG:
      - "How RAG Works": rag-llm-explain.md
      - "CLI Guide": rag-guide.md
      - "RAG Flow": rag-flow.md
    - Agent:
      - "Understanding Agents": agent-concepts.md
      - "Guide": agent-guide.md
      - "Agent Modules": agent-agents.md
      - "Tool Reference": agent-tools.md
      - "Build Your Own Tool": projects/agent/build-your-own-tool.md
    - Workflows:
      - "Understanding Workflows": workflow-guide.md
      - "Build a Pipeline": projects/workflow/build-a-pipeline.md
    - Evaluation:
      - "Understanding Evaluation": eval-guide.md
      - "Judge Your Bot": projects/eval/judge-your-bot.md
  - Build:
    - "Projects Overview": mini-projects.md
    - "Browse All Projects": projects/index.md
    - "Project Browser": project_browser.html
    - Chat Projects:
      - Advanced Journal Bot: projects/chat/advanced-journal-bot.md
